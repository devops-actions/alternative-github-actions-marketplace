version: 2
updates:
  # Keep GitHub Actions SHA pins up to date (Dependabot updates the SHA and keeps the version comment)
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "Europe/Amsterdam"
    labels:
      - dependencies
    commit-message:
      prefix: "deps"
    groups:
      azure-actions:
        patterns:
          - "azure/*"
          - "Azure/*"
      github-actions:
        patterns:
          - "actions/*"
          - "github/*"

  - package-ecosystem: npm
    directory: /src/frontend
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "Europe/Amsterdam"
    labels:
      - dependencies
    commit-message:
      prefix: "deps(frontend)"

  - package-ecosystem: npm
    directory: /src/backend
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "Europe/Amsterdam"
    labels:
      - dependencies
    commit-message:
      prefix: "deps(backend)"

  - package-ecosystem: npm
    directory: /src/mcp-server
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "Europe/Amsterdam"
    labels:
      - dependencies
    commit-message:
      prefix: "deps(mcp)"
